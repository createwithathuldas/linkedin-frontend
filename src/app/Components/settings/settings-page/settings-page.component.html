<div class="settings-page">
  <div class="settings-page__sidebar li-card">
    <h2>Settings</h2>
    @for (s of sections; track s.id) {
      <button
        [class.settings-page__nav--active]="activeSection() === s.id"
        (click)="setSection(s.id)"
      >{{ s.label }}</button>
    }
  </div>

  <div class="settings-page__content li-card">
    @if (activeSection() === 'privacy') {
      <h1>Privacy</h1>
      <label>Profile visibility</label>
      <select class="li-input" [(ngModel)]="profileVisibility">
        <option value="Public">Public</option>
        <option value="NetworkOnly">Connections only</option>
        <option value="Private">Private</option>
      </select>
      <label>
        <input type="checkbox" [(ngModel)]="showActiveStatus" />
        Show active status
      </label>
      <button class="li-btn li-btn--primary" (click)="savePrivacy()" [disabled]="saving()">
        {{ saving() ? 'Saving...' : 'Save' }}
      </button>
      @if (message()) { <p class="settings-page__success">{{ message() }}</p> }
    }
  </div>
</div>
