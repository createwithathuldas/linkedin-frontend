<aside class="right-sidebar">
  <div class="li-card right-sidebar__news">
    <h3>LinkedIn News</h3>
    <ul>
      @for (item of news; track item.title) {
        <li>
          <a href="#">{{ item.title }}</a>
          <span class="right-sidebar__readers">{{ item.readers }}</span>
        </li>
      }
    </ul>
    <a href="#" class="right-sidebar__show-more">Show more</a>
  </div>

  <div class="li-card right-sidebar__puzzle">
    <h3>Today's puzzle games</h3>
    <p class="li-text-muted">Zip, Mini Sudoku, Tango, Queens and more</p>
    <a routerLink="/games" class="li-btn li-btn--secondary">Solve puzzles</a>
  </div>

  <footer class="right-sidebar__footer">
    <div class="right-sidebar__links">
      <a href="#">About</a>
      <a href="#">Accessibility</a>
      <a href="#">Help Center</a>
      <a href="#">Privacy & Terms</a>
      <a href="#">Ad Choices</a>
      <a href="#">Advertising</a>
    </div>
    <p class="li-text-muted">LinkedIn Corporation © 2026</p>
  </footer>
</aside>
